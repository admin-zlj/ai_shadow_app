# ============================================================
# nginx/default.conf — nginx 反向代理配置
# 监听 80 端口，将所有请求转发到后端 Next.js 容器的 3000 端口
# 此文件通过 docker-compose volumes 挂载到容器内 /etc/nginx/conf.d/default.conf
# ============================================================

# 定义上游服务器组，名为 nextjs
# nginx 会将请求代理到这个组中的服务器
upstream nextjs {
    # 后端地址：nextjs 是 docker-compose 中定义的服务名
    # Docker 内置 DNS 会将其解析为 nextjs 容器的 IP，端口 3000 是 Next.js 监听端口
    server nextjs:3000;

    # 保持 32 个到后端的长连接池，避免每次请求都重新建立 TCP 连接
    # 配合 proxy_http_version 1.1 + Connection "" 实现 keep-alive
    keepalive 32;
}

# 定义一个 HTTP server 块（虚拟主机）
server {
    # 监听 80 端口（HTTP 默认端口），接收来自外部的所有请求
    listen 80;

    # 匹配所有 Host 头（_ 是 nginx 通配写法，表示不关心具体域名）
    server_name _;

    # 限制客户端请求体最大 10MB，防止超大文件上传耗尽服务器资源
    client_max_body_size 10m;

    # 根路径匹配，处理所有未被更具体的 location 匹配的请求
    location / {
        # 将请求反向代理到 upstream nextjs 组定义的后端服务器
        proxy_pass http://nextjs;

        # 使用 HTTP/1.1 协议与后端通信（默认 1.0 不支持 keep-alive）
        proxy_http_version 1.1;

        # 传递原始请求的 Host 头给后端，Next.js 依据它判断域名
        proxy_set_header Host $host;

        # 传递客户端真实 IP（而非 nginx 容器 IP）给后端
        proxy_set_header X-Real-IP $remote_addr;

        # 传递完整的代理链 IP 列表，后端可据此获取客户端真实 IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 传递原始请求协议（http 或 https），后端据此生成正确的跳转 URL
        proxy_set_header X-Forwarded-Proto $scheme;

        # 清空 Connection 头，使 nginx 与后端保持 keep-alive 长连接
        # 不设为 "" 的话 nginx 默认会发送 Connection: close，每次请求后断开连接
        proxy_set_header Connection "";

        # ---- SSE / 流式响应关键配置 ----
        # 关闭响应缓冲：nginx 默认会缓冲整个响应再发给客户端，这会导致 SSE 流被阻塞
        # 关闭后 nginx 收到后端数据立即转发给客户端，保证流式实时性
        proxy_buffering off;

        # 关闭代理缓存，流式响应不应被缓存
        proxy_cache off;

        # 读取后端响应的超时时间设为 300 秒（5 分钟）
        # SSE 连接是长连接，默认 60 秒太短会被 nginx 主动断开
        proxy_read_timeout 300s;

        # 向后端发送请求的超时时间设为 300 秒
        proxy_send_timeout 300s;

        # ---- 静态资源长缓存 ----
        # 嵌套 location：匹配以 .js/.css/.woff/.png 等结尾的静态资源请求
        # Next.js 构建的静态资源文件名含 hash，内容变更时 hash 也变，可安全长缓存
        location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp)$ {
            # 同样代理到后端 Next.js，由其处理静态资源
            proxy_pass http://nextjs;

            # HTTP/1.1 + 清空 Connection 头，复用 keep-alive 连接
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # 对 200 响应缓存 1 年（nginx 代理层缓存，减少对后端的请求）
            proxy_cache_valid 200 1y;

            # 给客户端响应添加 Cache-Control 头
            # public：允许 CDN 缓存；max-age=31536000：1 年；immutable：文件永不变
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }
}
